name: Documentation

on:
  pull_request:
    paths:
      - ".github/workflows/docs.yml"
      - ".readthedocs.yaml"
      - "docs/**"
      - "src/**"
      - "tools/update_api_reference.py"
      - "pyproject.toml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docs.yml"
      - ".readthedocs.yaml"
      - "docs/**"
      - "src/**"
      - "tools/update_api_reference.py"
      - "pyproject.toml"

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-readthedocs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            docs/requirements.txt

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r docs/requirements.txt

      - name: Verify API reference is current
        run: |
          python tools/update_api_reference.py
          git diff --exit-code -- docs/API_Reference.rst

      - name: Build Read the Docs site
        run: sphinx-build -b html -W --keep-going docs docs/_build/html
